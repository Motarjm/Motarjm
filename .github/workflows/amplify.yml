name: Build and deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
        run: |
          cd frontend
          npm install
          npm run build

      - name: Remove build-only directories
        run: |
          rm -rf frontend/node_modules

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/ubuntu/Motarjm/frontend/dist"
          strip_components: 2

      - name: Deploy to Lightsail via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/Motarjm
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/Motarjm/Motarjm.git
            git pull origin main
            source antenv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart turjman
            echo "Server started"

